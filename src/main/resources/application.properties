# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# API KEYS
alpha.vantage.api.key=${ALPHA_VANTAGE_API_KEY}

# Set to false in production to hard-fail instead of using fallback prices
app.stock.fallback.enabled=true

# ===============================
# MYSQL DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/stock_portfolio_alerts_db
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# KAFKA CONSUMER CONFIG
# ===============================
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Tell Kafka what class to map to
spring.kafka.consumer.properties.spring.json.value.default.type=com.bl.stockportfolioalerts.messaging.kafka.StockPriceEvent
spring.kafka.admin.fail-fast=false

# ===============================
# KAFKA PRODUCER CONFIG
# ===============================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] [%X{traceId}] [%thread] %logger - %msg%n
logging.level.org.springframework.kafka=DEBUG
logging.level.org.apache.kafka=WARN

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.kafka.bootstrap-servers=localhost:9092
management.health.kafka.enabled=true